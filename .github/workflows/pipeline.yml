name: Pipeline

on:
  workflow_call:
    inputs:
      version:
        description: Version string used for tagging build artifacts
        required: true
        type: string
      doRelease:
        description: Whether to publish release artifacts to npmjs
        required: false
        default: false
        type: boolean

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: n8n-nodes-csharp/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build runner
        run: dotnet build runner/N8n.CSharpRunner -c Release

      - name: Publish runner into npm package (multi-RID, self-contained)
        run: node scripts/publish-runner-multi-rid.mjs

      - name: Test runner
        run: dotnet test runner/N8n.CSharpRunner.Tests -c Release

      - name: Build node package
        working-directory: n8n-nodes-csharp
        run: |
          npm ci
          npm run build

      - name: Test node package
        working-directory: n8n-nodes-csharp
        run: npm test

      - name: Build Docker image (n8n + C#)
        run: |
          docker build \
            -f Dockerfile.n8n-csharp \
            -t n8n-csharp-ci:local \
            .

      - name: Setup Node.js (npmjs)
        if: inputs.doRelease
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Set npm package version
        if: inputs.doRelease
        working-directory: n8n-nodes-csharp
        run: npm version --no-git-tag-version --allow-same-version "${{ inputs.version }}"

      - name: Publish npm package to npmjs
        if: inputs.doRelease
        working-directory: n8n-nodes-csharp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
