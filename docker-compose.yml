services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n-csharp
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_CUSTOM_EXTENSIONS=/opt/n8n-custom
      # For local dev only. Change for any real environment.
      - N8N_ENCRYPTION_KEY=local-dev-only-change-me
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
